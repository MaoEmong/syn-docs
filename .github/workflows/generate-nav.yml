name: Generate Navigation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

permissions:
  contents: write

jobs:
  generate-nav:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate nav.json
        run: python3 scripts/generate_nav.py

      - name: Commit nav.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nav.json
          git diff --staged --quiet || git commit -m "chore: update nav.json"
          git push
